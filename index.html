<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🇹🇷 터키 여행 가이드 2026</title>
<style>
:root {
  --bg: #0f0f0f;
  --card: #1a1a1a;
  --card-alt: #222;
  --text: #e8e8e8;
  --text-dim: #999;
  --accent: #e74c3c;
  --accent2: #f39c12;
  --blue: #3498db;
  --green: #2ecc71;
  --purple: #9b59b6;
  --teal: #1abc9c;
  --pink: #e91e8e;
  --border: #333;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding-top: var(--safe-top);
  padding-bottom: calc(60px + var(--safe-bottom));
  overflow-x: hidden;
}
a { color: var(--blue); text-decoration: none; }

/* --- 헤더 --- */
.header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(135deg, #c0392b, #e74c3c);
  padding: 14px 16px;
  text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,.4);
}
.header h1 { font-size: 18px; font-weight: 700; color: #fff; }
.header .sub { font-size: 12px; color: rgba(255,255,255,.8); margin-top: 2px; }

/* --- 탭바 --- */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  display: flex;
  background: #111;
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
}
.tab-bar button {
  flex: 1;
  background: none; border: none; color: var(--text-dim);
  font-size: 10px; padding: 8px 0; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  transition: color .2s;
}
.tab-bar button.active { color: var(--accent); }
.tab-bar button .ico { font-size: 20px; }

/* --- 탭 컨텐츠 --- */
.tab-content { display: none; padding: 12px; }
.tab-content.active { display: block; }

/* --- 날짜 네비 --- */
.date-nav {
  display: flex; gap: 6px; overflow-x: auto; padding: 8px 0 12px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.date-nav::-webkit-scrollbar { display: none; }
.date-btn {
  flex-shrink: 0; background: var(--card); border: 1px solid var(--border);
  color: var(--text-dim); border-radius: 20px; padding: 6px 14px;
  font-size: 12px; cursor: pointer; white-space: nowrap; transition: all .2s;
}
.date-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.date-btn .day { font-weight: 700; }

/* --- 일정 카드 --- */
.day-section { margin-bottom: 16px; }
.day-header {
  font-size: 16px; font-weight: 700; padding: 8px 0 4px;
  border-bottom: 2px solid var(--accent); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.day-header .city { font-size: 12px; color: var(--accent2); font-weight: 400; }

.event-card {
  background: var(--card); border-radius: 12px; padding: 12px;
  margin-bottom: 8px; border-left: 4px solid var(--border);
  transition: transform .15s;
}
.event-card:active { transform: scale(.98); }
.event-time {
  font-size: 12px; color: var(--accent2); font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}
.event-title { font-size: 15px; font-weight: 600; margin: 4px 0; }
.event-loc { font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
.event-desc {
  font-size: 12px; color: var(--text-dim); line-height: 1.6;
  display: none; margin-top: 8px; padding-top: 8px;
  border-top: 1px solid var(--border);
}
.event-desc.open { display: block; }
.event-cost { font-size: 11px; color: var(--green); margin-top: 4px; }
.event-links { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
.event-links a {
  font-size: 11px; background: rgba(52,152,219,.15); color: var(--blue);
  padding: 3px 8px; border-radius: 6px;
}
.expand-btn {
  background: none; border: none; color: var(--text-dim);
  font-size: 11px; cursor: pointer; padding: 4px 0;
}

/* 카테고리 색상 */
.cat-flight { border-left-color: #2980b9; }
.cat-move { border-left-color: #7f8c8d; }
.cat-hotel { border-left-color: #27ae60; }
.cat-food { border-left-color: #e67e22; }
.cat-sight { border-left-color: #8e44ad; }
.cat-rest { border-left-color: #95a5a6; }
.cat-shop { border-left-color: #e74c3c; }
.cat-cafe { border-left-color: #f1c40f; }
.cat-exp { border-left-color: #1abc9c; }
.cat-rent { border-left-color: #d35400; }
.cat-lounge { border-left-color: #1abc9c; }

/* --- 대안 옵션 --- */
.alt-options { margin: -4px 0 12px; padding: 8px 8px 4px; border-left: 3px dashed var(--accent2); border-radius: 0 8px 8px 0; background: rgba(243,156,18,.05); }
.alt-label { font-size: 12px; font-weight: 700; color: var(--accent2); margin-bottom: 6px; }
.alt-card { opacity: 0.85; border-style: dashed; margin-bottom: 6px; }
.bonus-badge { display: inline-block; font-size: 10px; background: rgba(243,156,18,.2); color: var(--accent2); padding: 2px 6px; border-radius: 4px; margin-right: 4px; }

/* --- 식당 --- */
.rest-card {
  background: var(--card); border-radius: 12px; padding: 12px;
  margin-bottom: 8px;
}
.rest-card.highlight { border: 1px solid var(--accent2); }
.rest-meal { font-size: 11px; color: var(--accent2); font-weight: 600; text-transform: uppercase; }
.rest-name { font-size: 15px; font-weight: 700; margin: 3px 0; }
.rest-rating { color: #f1c40f; font-size: 12px; }
.rest-menu { font-size: 12px; color: var(--text-dim); margin: 4px 0; }
.rest-meta { font-size: 11px; color: var(--text-dim); display: flex; gap: 12px; flex-wrap: wrap; }
.rest-tag {
  display: inline-block; font-size: 10px; padding: 2px 6px;
  border-radius: 4px; margin-right: 4px;
}
.tag-best { background: rgba(231,76,60,.2); color: var(--accent); }
.tag-anniv { background: rgba(243,156,18,.2); color: var(--accent2); }
.tag-reserve { background: rgba(52,152,219,.2); color: var(--blue); }

/* --- 티켓 --- */
.ticket-card {
  background: var(--card); border-radius: 12px; padding: 12px;
  margin-bottom: 8px;
}
.ticket-name { font-size: 14px; font-weight: 600; }
.ticket-price { font-size: 13px; color: var(--green); margin: 4px 0; }
.ticket-note { font-size: 12px; color: var(--text-dim); }
.ticket-strategy {
  background: linear-gradient(135deg, rgba(39,174,96,.1), rgba(52,152,219,.1));
  border: 1px solid rgba(39,174,96,.3);
  border-radius: 12px; padding: 14px; margin: 12px 0;
}
.ticket-strategy h3 { color: var(--green); font-size: 14px; margin-bottom: 8px; }

/* --- 실용정보 --- */
.info-section { margin-bottom: 16px; }
.info-section h3 {
  font-size: 15px; font-weight: 700; padding: 8px 0;
  border-bottom: 1px solid var(--border); margin-bottom: 8px;
}
.info-item {
  display: flex; gap: 8px; padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,.05);
  font-size: 13px;
}
.info-label { color: var(--accent2); font-weight: 600; min-width: 100px; flex-shrink: 0; }
.info-value { color: var(--text-dim); flex: 1; }

/* --- 체크리스트 --- */
.check-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,.05);
  font-size: 13px;
}
.check-item input[type="checkbox"] {
  width: 20px; height: 20px; accent-color: var(--green);
  flex-shrink: 0;
}
.check-item.checked label { color: var(--text-dim); text-decoration: line-through; }
.check-cat { font-size: 13px; font-weight: 700; color: var(--accent2); margin: 12px 0 4px; }

/* --- 호텔 CI/CO --- */
.hotel-card {
  background: var(--card); border-radius: 12px; padding: 12px;
  margin-bottom: 8px; border-left: 4px solid var(--green);
}
.hotel-name { font-size: 14px; font-weight: 700; }
.hotel-dates { font-size: 12px; color: var(--text-dim); margin: 4px 0; }
.hotel-warn { font-size: 12px; color: var(--accent); }

/* --- 검색 --- */
.search-box {
  position: sticky; top: 50px; z-index: 50;
  padding: 8px 0; background: var(--bg);
}
.search-box input {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--text); font-size: 14px; outline: none;
}
.search-box input:focus { border-color: var(--accent); }

/* --- 비용 서머리 --- */
.cost-summary {
  background: linear-gradient(135deg, var(--card), var(--card-alt));
  border-radius: 12px; padding: 14px; margin: 12px 0;
  border: 1px solid var(--border);
}
.cost-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; }
.cost-total { font-weight: 700; font-size: 15px; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; }

/* --- D-day --- */
.dday {
  text-align: center; padding: 16px;
  background: linear-gradient(135deg, rgba(231,76,60,.15), rgba(243,156,18,.15));
  border-radius: 12px; margin: 8px 0 16px;
}
.dday .num { font-size: 32px; font-weight: 800; color: var(--accent); }
.dday .label { font-size: 12px; color: var(--text-dim); }

/* --- 이중 시계 (KST + TRT) --- */
.dual-clock {
  display: flex; align-items: center; justify-content: center;
  gap: 14px; margin-top: 8px; font-size: 12px; color: rgba(255,255,255,.85);
}
.dual-clock .flag-time { display: flex; align-items: center; gap: 4px; }
.dual-clock .clock-time {
  font-weight: 700; font-size: 14px;
  font-variant-numeric: tabular-nums; letter-spacing: .5px;
}
.dual-clock .sep { color: rgba(255,255,255,.3); }

/* --- 미션 체크박스 --- */
.event-card { position: relative; }
.mission-check {
  position: absolute; top: 10px; right: 10px;
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--card-alt); border: 2px solid var(--border);
  cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: all .2s; z-index: 2; line-height: 1;
}
.event-card.mission-done { opacity: 0.5; }
.event-card.mission-done .event-title { text-decoration: line-through; color: var(--text-dim); }
.event-card.mission-done .mission-check { background: transparent; border-color: transparent; }

/* --- 여행 N일차 + 진행도 --- */
.day-num-badge {
  font-size: 11px; font-weight: 600; background: rgba(243,156,18,.2);
  color: var(--accent2); padding: 2px 8px; border-radius: 10px; margin-left: auto;
}
.day-progress {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--text-dim); margin-bottom: 10px;
}
.day-progress-bar {
  flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
}
.day-progress-fill {
  height: 100%; background: var(--green); border-radius: 2px; transition: width .4s ease;
}

/* --- 메모 --- */
.memo-btn {
  display: inline-block; font-size: 11px; color: var(--text-dim);
  background: none; border: none; cursor: pointer; padding: 4px 0; margin-top: 6px;
}
.memo-btn:hover { color: var(--accent2); }
.memo-area {
  display: none; margin-top: 8px; padding: 8px;
  background: rgba(243,156,18,.07); border: 1px solid rgba(243,156,18,.25);
  border-radius: 8px;
}
.memo-area.open { display: block; }
.memo-area textarea {
  width: 100%; background: transparent; border: none; color: var(--text);
  font-size: 12px; line-height: 1.6; resize: none; min-height: 56px;
  font-family: inherit; display: block;
}
.memo-area textarea:focus { outline: none; }
.memo-save-btn {
  font-size: 11px; background: var(--accent2); color: #fff; border: none;
  padding: 3px 12px; border-radius: 6px; cursor: pointer; margin-top: 4px;
}
.memo-display {
  font-size: 12px; color: var(--accent2); margin-top: 6px;
  background: rgba(243,156,18,.08); border-left: 3px solid var(--accent2);
  padding: 6px 8px; border-radius: 0 6px 6px 0; white-space: pre-wrap;
}

/* 스크롤 top */
.scroll-top {
  position: fixed; bottom: 72px; right: 16px; z-index: 90;
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent); color: #fff; border: none;
  font-size: 18px; cursor: pointer; display: none;
  box-shadow: 0 2px 8px rgba(0,0,0,.4);
}
.scroll-top.show { display: flex; align-items: center; justify-content: center; }

/* GitHub 저장 버튼 */
.github-save {
  position: fixed; bottom: 120px; right: 16px; z-index: 90;
  width: 44px; height: 44px; border-radius: 50%;
  background: #238636; color: #fff; border: none;
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 10px rgba(0,0,0,.5);
  transition: transform .15s, opacity .2s;
}
.github-save:active { transform: scale(.9); }
.github-save.hidden { opacity: 0; pointer-events: none; }
/* 저장 토스트 */
.save-toast {
  position: fixed; bottom: 170px; right: 16px; z-index: 200;
  background: #238636; color: #fff;
  font-size: 12px; padding: 8px 14px; border-radius: 20px;
  box-shadow: 0 2px 10px rgba(0,0,0,.4);
  display: none; white-space: nowrap;
}
.save-toast.show { display: block; animation: fadeIn .25s ease; }

/* 애니메이션 */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.fade-in { animation: fadeIn .3s ease; }
</style>
</head>

<div class="header" onclick="showDatePicker()">
  <h1>🇹🇷 터키 9주년 기념여행</h1>
  <div class="sub">2026.03.12(목) ~ 03.21(토) · 10일</div>
  <div class="dual-clock">
    <div class="flag-time">🇰🇷 <span class="clock-time" id="kst-time">--:--</span></div>
    <span class="sep">|</span>
    <div class="flag-time">🇹🇷 <span class="clock-time" id="trt-time">--:--</span></div>
  </div>
</div>

<!-- 날짜 퀵점프 오버레이 -->
<div id="date-picker-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(0,0,0,.7)" onclick="hideDatePicker()">
  <div style="background:#1a1a1a;border-radius:0 0 16px 16px;padding:16px;border-bottom:2px solid var(--accent)" onclick="event.stopPropagation()">
    <div style="font-size:13px;font-weight:700;color:var(--accent2);margin-bottom:10px;text-align:center">📅 날짜 바로가기</div>
    <div id="date-picker-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px"></div>
    <div style="text-align:center;margin-top:10px;font-size:11px;color:var(--text-dim)">영역 밖 터치하면 닫힘</div>
  </div>
</div>

<!-- ========== 탭 컨텐츠 ========== -->

<!-- 탭1: 일정표 -->
<div id="tab-schedule" class="tab-content active">
  <div class="dday" id="dday-box"></div>
  <div class="date-nav" id="date-nav"></div>
  <div id="schedule-content"></div>
</div>

<!-- 탭2: 맛집 -->
<div id="tab-food" class="tab-content">
  <div class="search-box"><input type="text" id="food-search" placeholder="식당/메뉴 검색..."></div>
  <div id="food-content"></div>
</div>

<!-- 탭3: 티켓 -->
<div id="tab-ticket" class="tab-content">
  <div id="ticket-content"></div>
</div>

<!-- 탭4: 준비물 -->
<div id="tab-pack" class="tab-content">
  <div id="pack-content"></div>
</div>

<!-- 탭5: 실용정보 -->
<div id="tab-info" class="tab-content">
  <div id="info-content"></div>
</div>

<!-- 탭바 -->
<div class="tab-bar">
  <button class="active" onclick="switchTab('schedule')"><span class="ico">📅</span>일정</button>
  <button onclick="switchTab('food')"><span class="ico">🍽️</span>맛집</button>
  <button onclick="switchTab('ticket')"><span class="ico">🎫</span>티켓</button>
  <button onclick="switchTab('pack')"><span class="ico">🧳</span>준비물</button>
  <button onclick="switchTab('info')"><span class="ico">ℹ️</span>정보</button>
</div>

<button class="scroll-top" id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<button class="github-save hidden" id="github-save-btn" onclick="exportMemosToShortcut()" title="메모 저장 → 단축어">📤</button>
<div class="save-toast" id="save-toast">클립보드 복사 완료! 단축어 실행중...</div>

function renderDDay() {
  const box = document.getElementById('dday-box');
  const now = new Date();
  const trip = new Date('2026-03-12T00:00:00+09:00');
  const diff = Math.ceil((trip - now) / 86400000);
  if (diff > 0) box.innerHTML = `<div class="label">터키 출발까지</div><div class="num">D-${diff}</div>`;
  else if (diff === 0) box.innerHTML = `<div class="num">D-DAY!</div><div class="label">오늘 출발! ✈️</div>`;
  else if (diff >= -10) box.innerHTML = `<div class="num">여행 ${-diff}일차</div><div class="label">즐거운 여행 되세요! 🎉</div>`;
  else box.innerHTML = `<div class="label">9주년 기념 터키 여행</div><div class="num">완료!</div>`;
}

function renderDateNav() {

    const m = dt.getMonth() + 1;

function scrollToDate(d, btn) {

  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderSchedule() {
  const container = document.getElementById('schedule-content');
  let html = '';
  let currentDate = '';

  // 날짜별 이벤트 수 사전 계산
  const dayCounts = {};
  SCHEDULE.forEach((ev, i) => { dayCounts[ev.d] = (dayCounts[ev.d] || 0) + 1; });

  // localStorage 로드
  const missions = JSON.parse(localStorage.getItem('turkey-missions') || '{}');
  const memos   = JSON.parse(localStorage.getItem('turkey-memos')    || '{}');

  const TRIP_START_MS = new Date('2026-03-12T00:00:00+09:00').getTime();

  SCHEDULE.forEach((ev, idx) => {
    const key = 'ev_' + ev.d + '_' + idx;
    const isMission = missions[key] === true;
    const memoText  = memos[key] || '';

    if (ev.d !== currentDate) {
      if (currentDate) html += '</div>';
      currentDate = ev.d;
      const dt  = new Date(ev.d + 'T00:00:00');
      const m   = dt.getMonth() + 1;
      const dd  = dt.getDate();
      const day = DAY_NAMES[dt.getDay()];
      const city = CITY_MAP[ev.d] || '';

      // 여행 N일차
      const dayNum = Math.floor((new Date(ev.d + 'T12:00:00+09:00').getTime() - TRIP_START_MS) / 86400000) + 1;

      // 이 날 완료 수
      const dayKeys = [];
      SCHEDULE.forEach((e, i) => { if (e.d === ev.d) dayKeys.push('ev_' + e.d + '_' + i); });
      const doneCount = dayKeys.filter(k => missions[k]).length;
      const totalCount = dayCounts[ev.d];
      const pct = totalCount > 0 ? Math.round(doneCount / totalCount * 100) : 0;

      html += `<div class="day-section fade-in" id="day-${ev.d}">
        <div class="day-header">${m}/${dd} (${day}) <span class="city">${city}</span><span class="day-num-badge">여행 ${dayNum}일차</span></div>
        <div class="day-progress">
          <div class="day-progress-bar"><div class="day-progress-fill" id="prog-${ev.d}" style="width:${pct}%"></div></div>
          <span id="prog-text-${ev.d}" style="min-width:36px;text-align:right">${doneCount}/${totalCount} ✓</span>
        </div>`;
    }

    const cls = CAT_CLASS[ev.cat] || '';
    const timeStr = ev.s === ev.e ? ev.s : `${ev.s} ~ ${ev.e}`;
    const costStr = ev.cost ? `<div class="event-cost">💰 ${ev.cost.toLocaleString()}원${ev.costTry ? ' ('+ev.costTry+')' : ''}</div>` : '';
    const links = [];
    if (ev.map) links.push(`<a href="${navUrl(ev.map)}" target="_blank">📍 길찾기</a>`);
    if (ev.route) links.push(`<a href="${routeUrl(ev.route.o,ev.route.d,ev.route.m)}" target="_blank">🚗 경로</a>`);
    const linksHtml = links.length ? `<div class="event-links">${links.join('')}</div>` : '';
    const memoDisplayHtml = memoText ? `<div class="memo-display">✏️ ${memoText.replace(/\n/g,'<br>').replace(/</g,'&lt;')}</div>` : '';

    html += `<div class="event-card ${cls}${isMission?' mission-done':''}" data-key="${key}" onclick="toggleDesc(this)">
      <button class="mission-check" onclick="toggleMission('${key}','${ev.d}',event)" title="${isMission?'완료취소':'미션 완료!'}">${isMission?'✅':''}</button>
      <div class="event-time">${timeStr}${ev.tz ? ' <span style="color:var(--blue);font-size:11px">['+ev.tz+']</span>' : ''}</div>
      <div class="event-title">${ev.t}</div>
      <div class="event-loc">📍 ${ev.loc}</div>
      <div class="event-desc">
        ${(ev.desc||'').replace(/\n/g,'<br>')}${costStr}${linksHtml}
        <button class="memo-btn" onclick="toggleMemo('${key}',event)">✏️ 메모${memoText?' (있음)':' 추가'}</button>
        <div class="memo-area" id="memo-area-${key}">
          <textarea placeholder="여행 중 느낀 점, 팁, 가격 등 자유롭게..." id="memo-text-${key}" oninput="autoResize(this)">${memoText}</textarea>
          <button class="memo-save-btn" onclick="saveMemo('${key}',event)">💾 저장</button>
        </div>
        ${memoDisplayHtml}
      </div>
      <button class="expand-btn">▼ 상세보기</button>
    </div>`;

    // 대안 옵션 렌더링
    if (ev.alt && ev.alt.length) {
      html += `<div class="alt-options"><div class="alt-label">💡 다른 옵션</div>`;
      ev.alt.forEach(a => {
        const aCls = CAT_CLASS[a.cat] || '';
        const aCost = a.cost ? `<div class="event-cost">💰 ${a.cost.toLocaleString()}원${a.costTry?' ('+a.costTry+')':''}</div>` : '';
        const aLinks = [];
        if (a.map) aLinks.push(`<a href="${navUrl(a.map)}" target="_blank">📍 길찾기</a>`);
        if (a.route) aLinks.push(`<a href="${routeUrl(a.route.o,a.route.d,a.route.m)}" target="_blank">🚗 경로</a>`);
        html += `<div class="event-card alt-card ${aCls}">
          <div class="event-title">${a.t}</div>
          <div class="event-loc">📍 ${a.loc}</div>
          <div style="font-size:12px;color:var(--text-dim)">${a.desc}${aCost}</div>
          ${aLinks.length?'<div class="event-links">'+aLinks.join('')+'</div>':''}
        </div>`;
      });
      html += `</div>`;
    }
  });

  html += '</div>';
  container.innerHTML = html;
}

function toggleDesc(card) {
  const desc = card.querySelector('.event-desc');
  const btn = card.querySelector('.expand-btn');
  if (desc.classList.contains('open')) {
    desc.classList.remove('open');
    btn.textContent = '▼ 상세보기';
  } else {
    desc.classList.add('open');
    btn.textContent = '▲ 접기';
  }
}

// ===== 이중 시계 (KST + TRT) =====
function updateClock() {
  const now = new Date();
  const fmt = tz => new Date(now.toLocaleString('en-US', {timeZone: tz}))
    .toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', hour12:false});
  const kEl = document.getElementById('kst-time');
  const tEl = document.getElementById('trt-time');
  if (kEl) kEl.textContent = fmt('Asia/Seoul');
  if (tEl) tEl.textContent = fmt('Europe/Istanbul');
}

// ===== 미션 체크박스 =====
function toggleMission(key, date, e) {
  e.stopPropagation();
  const missions = JSON.parse(localStorage.getItem('turkey-missions') || '{}');
  missions[key] = !missions[key];
  localStorage.setItem('turkey-missions', JSON.stringify(missions));
  const card = document.querySelector(`[data-key="${key}"]`);
  if (!card) return;
  const done = missions[key];
  card.classList.toggle('mission-done', done);
  const btn = card.querySelector('.mission-check');
  if (btn) { btn.textContent = done ? '✅' : ''; btn.title = done ? '완료취소' : '미션 완료!'; }
  updateDayProgress(date);
}

function updateDayProgress(date) {
  const missions = JSON.parse(localStorage.getItem('turkey-missions') || '{}');
  const dayKeys = [];
  SCHEDULE.forEach((ev, i) => { if (ev.d === date) dayKeys.push('ev_' + ev.d + '_' + i); });
  const done = dayKeys.filter(k => missions[k]).length;
  const total = dayKeys.length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const fillEl = document.getElementById('prog-' + date);
  const textEl = document.getElementById('prog-text-' + date);
  if (fillEl) fillEl.style.width = pct + '%';
  if (textEl) textEl.textContent = done + '/' + total + ' ✓';
}

// ===== 메모 =====
function toggleMemo(key, e) {
  e.stopPropagation();
  const area = document.getElementById('memo-area-' + key);
  if (!area) return;
  area.classList.toggle('open');
  if (area.classList.contains('open')) {
    const ta = document.getElementById('memo-text-' + key);
    if (ta) { ta.focus(); autoResize(ta); }
  }
}

function saveMemo(key, e) {
  e.stopPropagation();
  const ta = document.getElementById('memo-text-' + key);
  if (!ta) return;
  const memos = JSON.parse(localStorage.getItem('turkey-memos') || '{}');
  const val = ta.value.trim();
  if (val) memos[key] = val; else delete memos[key];
  localStorage.setItem('turkey-memos', JSON.stringify(memos));

  const card = document.querySelector(`[data-key="${key}"]`);
  if (!card) return;
  const area = document.getElementById('memo-area-' + key);
  const memoBtn = card.querySelector('.memo-btn');
  let display = card.querySelector('.memo-display');

  if (val) {
    if (!display) {
      display = document.createElement('div');
      display.className = 'memo-display';
      area.after(display);
    }
    display.innerHTML = '✏️ ' + val.replace(/</g,'&lt;').replace(/\n/g,'<br>');
    if (memoBtn) memoBtn.textContent = '✏️ 메모 (있음)';
  } else {
    if (display) display.remove();
    if (memoBtn) memoBtn.textContent = '✏️ 메모 추가';
  }
  if (area) area.classList.remove('open');
  updateGithubSaveBtn(); // 메모 추가/삭제 시 GitHub 저장 버튼 표시 업데이트
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

// ===== 날짜 퀵점프 오버레이 (헤더 탭 시) =====
function showDatePicker() {
  const overlay = document.getElementById('date-picker-overlay');
  const grid = document.getElementById('date-picker-grid');
  if (!overlay || !grid) return;

  // 일정 탭일 때만 활성화
  const scheduleTab = document.getElementById('tab-schedule');
  if (!scheduleTab || !scheduleTab.classList.contains('active')) return;

  grid.innerHTML = DATES.map(d => {
    const dt = new Date(d + 'T00:00:00');
    const m  = dt.getMonth() + 1;
    const dd = dt.getDate();
    const day = DAY_NAMES[dt.getDay()];
    return `<button onclick="jumpToDate('${d}')" style="
      background:var(--card);border:1px solid var(--border);border-radius:10px;
      padding:8px 4px;color:var(--text);cursor:pointer;font-size:12px;line-height:1.4">
      <div style="font-weight:700;color:var(--accent2)">${m}/${dd}</div>
      <div style="font-size:10px;color:var(--text-dim)">${day}</div>
    </button>`;
  }).join('');

  overlay.style.display = 'block';
}

function hideDatePicker() {
  const overlay = document.getElementById('date-picker-overlay');
  if (overlay) overlay.style.display = 'none';
}

function jumpToDate(d) {
  hideDatePicker();
  const el = document.getElementById('day-' + d);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    // 날짜 네비 버튼도 활성화
    document.querySelectorAll('.date-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.date === d);
    });
  }
}

function renderPack() {

  let html = '';

  // 호텔 체크인/아웃
  html += '<div class="info-section"><h3>🏨 호텔 체크인/아웃</h3>';
  HOTELS.forEach(h => {
    html += `<div class="hotel-card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="hotel-name">${h.name}</div>
        <a href="${mapsUrl(h.map)}" target="_blank" style="font-size:11px">📍 지도</a>
      </div>
      <div class="hotel-dates">CI: ${h.ci} → CO: ${h.co}</div>
      ${h.warn ? `<div class="hotel-warn">${h.warn}</div>` : ''}
    </div>`;
  });
  html += '</div>';

  // 체크리스트
  html += '<div class="info-section"><h3>🧳 준비물 체크리스트</h3>';
  const savedChecks = JSON.parse(localStorage.getItem('turkey-checklist') || '{}');

  CHECKLIST.forEach(cat => {
    html += `<div class="check-cat">${cat.cat}</div>`;
    cat.items.forEach((item, idx) => {
      const key = cat.cat + '-' + idx;
      const isChecked = savedChecks[key] !== undefined ? savedChecks[key] : item.c;
      html += `<div class="check-item${isChecked?' checked':''}">
        <input type="checkbox" id="${key}" ${isChecked?'checked':''} onchange="toggleCheck('${key}',this)">
        <label for="${key}">${item.n}</label>
      </div>`;
    });
  });
  html += '</div>';

  container.innerHTML = html;
}

function toggleCheck(key, el) {
  const saved = JSON.parse(localStorage.getItem('turkey-checklist') || '{}');
  saved[key] = el.checked;
  localStorage.setItem('turkey-checklist', JSON.stringify(saved));
  el.closest('.check-item').classList.toggle('checked', el.checked);
}

// 📤 GitHub 저장 (메모 → 클립보드 → 단축어)
// ============================================================
function updateGithubSaveBtn() {
  const memos = JSON.parse(localStorage.getItem('turkey-memos') || '{}');
  const hasMemo = Object.keys(memos).some(k => memos[k] && memos[k].trim());
  const btn = document.getElementById('github-save-btn');
  if (btn) btn.classList.toggle('hidden', !hasMemo);
}

function exportMemosToShortcut() {
  const memos    = JSON.parse(localStorage.getItem('turkey-memos')    || '{}');
  const missions = JSON.parse(localStorage.getItem('turkey-missions') || '{}');

  // 메모를 이벤트 제목 + 날짜 포함 형태로 정리
  const enriched = {};
  Object.keys(memos).forEach(key => {
    if (!memos[key] || !memos[key].trim()) return;
    // key 형식: ev_2026-03-12_3
    const parts = key.split('_');
    const dateStr = parts.slice(1, parts.length - 1).join('-');
    const idx = parseInt(parts[parts.length - 1], 10);
    const ev = SCHEDULE.find((e, i) => e.d === dateStr && i === idx);
    const title = ev ? `[${dateStr}] ${ev.t}` : key;
    enriched[title] = memos[key].trim();
  });

  const payload = {
    exportedAt: new Date().toISOString(),
    memo_count: Object.keys(enriched).length,
    memos: enriched,
    missions_done: Object.values(missions).filter(Boolean).length
  };
  const jsonStr = JSON.stringify(payload, null, 2);

  // 클립보드 복사 후 단축어 실행
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(jsonStr)
      .then(() => { showSaveToast(); openShortcut(); })
      .catch(() => { fallbackCopy(jsonStr); });
  } else {
    fallbackCopy(jsonStr);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
  document.body.appendChild(ta);
  ta.select(); ta.setSelectionRange(0, 99999);
  document.execCommand('copy');
  document.body.removeChild(ta);
  showSaveToast();
  openShortcut();
}

function showSaveToast() {
  const t = document.getElementById('save-toast');
  if (!t) return;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function openShortcut() {
  // iOS 단축어 앱 실행 (앱 이름 = "터키여행메모")
  setTimeout(() => {
    window.location.href = 'shortcuts://run-shortcut?name=%ED%84%B0%ED%82%A4%EC%97%AC%ED%96%89%EB%A9%94%EB%AA%A8';
  }, 400);
}
